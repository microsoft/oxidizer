name: main

permissions:
  contents: read
  pull-requests: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Computes the impacted-crate scope for the rest of the pipeline.
  # On pull_request: snapshots origin/<base_ref> and the PR head, then emits
  # `-p NAME ...` cargo args for each tier (modified / affected / required).
  # On push: emits `--workspace` for all tiers (full backstop build).
  # If a PR touches no crates (e.g. doc-only), `skip=true` and source-related
  # jobs are short-circuited.
  #
  # Note: snapshots are taken on the PR head SHA, not on the merge commit that
  # downstream jobs build. This matches cargo-delta's PR-optimization model;
  # the push-to-main backstop catches anything skewed by the merge.
  delta:
    runs-on: ubuntu-latest
    outputs:
      modified: ${{ steps.compute.outputs.modified }}
      affected: ${{ steps.compute.outputs.affected }}
      required: ${{ steps.compute.outputs.required }}
      skip: ${{ steps.compute.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/setup
        with:
          rust-toolchain: RUST_LATEST
          cargo-tools: CARGO_DELTA_VERSION
      - name: Compute Impact
        id: compute
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            # push to main (or any non-PR trigger) → backstop: full workspace.
            {
              echo "modified=--workspace"
              echo "affected=--workspace"
              echo "required=--workspace"
              echo "skip=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          head_sha=$(git rev-parse HEAD)
          git fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
          git checkout "origin/$BASE_REF"
          cargo delta snapshot > baseline.json
          git checkout "$head_sha"
          cargo delta snapshot > current.json

          MODIFIED=$(cargo delta impact --baseline baseline.json --current current.json -f cargo-args --modified)
          AFFECTED=$(cargo delta impact --baseline baseline.json --current current.json -f cargo-args --affected)
          REQUIRED=$(cargo delta impact --baseline baseline.json --current current.json -f cargo-args --required)

          echo "Modified: ${MODIFIED:-<none>}"
          echo "Affected: ${AFFECTED:-<none>}"
          echo "Required: ${REQUIRED:-<none>}"

          # `required` is the superset of `affected` ⊇ `modified`; if it's empty,
          # nothing is impacted and source-scoped jobs can be skipped entirely.
          if [[ -z "$REQUIRED" ]]; then
            skip=true
          else
            skip=false
          fi

          {
            echo "modified=$MODIFIED"
            echo "affected=$AFFECTED"
            echo "required=$REQUIRED"
            echo "skip=$skip"
          } >> "$GITHUB_OUTPUT"

  testing:
    needs: [delta]
    if: needs.delta.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_MSRV, RUST_NIGHTLY
          cargo-tools: CARGO_NEXTEST_VERSION, CARGO_HACK_VERSION, JUST_VERSION

      # execute
      - name: Build
        run: cargo hack build --each-feature ${{ needs.delta.outputs.affected }} --verbose --locked --color always
      - name: Tests
        if: success() || failure()
        run: cargo nextest run --verbose ${{ needs.delta.outputs.affected }} --all-features
      - name: Docs
        if: success() || failure()
        env:
          RUSTDOCFLAGS: "--cfg docsrs -D warnings"
        run: cargo +${{ env.RUST_NIGHTLY }} doc --no-deps --verbose ${{ needs.delta.outputs.required }} --all-features
      - name: Doc Tests
        if: success() || failure()
        run: cargo test --doc --verbose ${{ needs.delta.outputs.affected }} --all-features
      - name: Examples
        run: just examples

  static-analysis:
    needs: [delta]
    if: needs.delta.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm, windows-11-arm]
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_LATEST
          rust-components: clippy, rustfmt
          cargo-tools: CARGO_DOC2README_VERSION, CARGO_WORKSPACES_VERSION, CARGO_ENSURE_NO_DEFAULT_FEATURES_VERSION, CARGO_ENSURE_NO_CYCLIC_DEPS_VERSION, CARGO_DENY_VERSION, CARGO_SORT_VERSION

      # execute
      - name: Clippy
        run: cargo clippy ${{ needs.delta.outputs.modified }} --all-targets --all-features -- -D warnings
      - name: Source Format
        if: success() || failure()
        run: cargo fmt ${{ needs.delta.outputs.modified }} -- --check
      - name: Cargo.toml Format
        if: success() || failure()
        run: cargo sort --check --grouped --workspace
      - name: Readmes
        if: success() || failure()
        run: cargo workspaces exec --ignore-private cargo doc2readme --check --lib --template ../README.j2
        env:
          # Disable sccache: macro expansion (rustc -Zunpretty=expanded) does not
          # produce the artifact files sccache expects to cache, causing it to fail.
          RUSTC_WRAPPER: ""
      - name: Default Features
        if: success() || failure()
        run: cargo ensure-no-default-features
      - name: Cyclic Dependencies
        if: success() || failure()
        run: cargo ensure-no-cyclic-deps
      - name: Dependency Validation
        if: success() || failure()
        run: cargo deny --all-features --workspace --color always check all

  spell-check:
    runs-on: ubuntu-slim
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
      - name: Setup
        uses: ./.github/actions/setup
        with:
          rust-toolchain: RUST_LATEST
          cargo-tools: CARGO_SPELLCHECK_VERSION, JUST_VERSION

      - name: Check Spelling
        run: just spellcheck

  semver:
    needs: [delta]
    if: github.event_name == 'pull_request' && needs.delta.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_LATEST
          cargo-tools: CARGO_SEMVER_CHECKS_VERSION

      # execute
      - name: Semver Compatibility
        id: semver
        continue-on-error: true
        run: |
          set -o pipefail
          cargo semver-checks --all-features ${{ needs.delta.outputs.affected }} --color never --baseline-rev origin/${{ github.base_ref }} 2>&1 | tee semver-output.txt

      # report
      - name: Prepare Semver Comment
        if: steps.semver.outcome == 'failure'
        run: |
          echo "## ⚠️ Breaking Changes Detected" > semver-comment.txt
          echo "" >> semver-comment.txt
          echo '```' >> semver-comment.txt
          grep -v "^ *Cloning " semver-output.txt | grep -v "^ *Building " | grep -v "^ *Built \[" | grep -v "^ *Parsing " | grep -v "^ *Parsed \[" | grep -v "^ *Checking" | grep -v "^ *Checked \[" | grep -v "^ *Finished \[" | grep -v "^ *Summary " >> semver-comment.txt
          echo '```' >> semver-comment.txt
          echo "" >> semver-comment.txt
          echo "If the breaking changes are intentional then everything is fine - this message is merely informative." >> semver-comment.txt
          echo "" >> semver-comment.txt
          echo "Remember to apply a version number bump with the correct severity when publishing a version with breaking changes (\`1.x.x -> 2.x.x\` or \`0.1.x -> 0.2.x\`)." >> semver-comment.txt

      - name: Post Semver Failure Comment
        if: steps.semver.outcome == 'failure' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3.0.2
        with:
          header: semver-check
          path: semver-comment.txt

      - name: Remove Semver Comment on Success
        if: steps.semver.outcome == 'success' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v3.0.2
        with:
          header: semver-check
          delete: true

  extended-analysis:
    name: extended-analysis (${{ matrix.os }})
    if: github.event_name == 'pull_request' && needs.delta.outputs.skip != 'true'
    needs: [delta, testing, static-analysis]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_NIGHTLY
          rust-components: miri
          cargo-tools: CARGO_UDEPS_VERSION, CARGO_CAREFUL_VERSION, CARGO_NEXTEST_VERSION

      # execute
      - name: Udeps
        run: cargo +${{ env.RUST_NIGHTLY }} udeps --all-features --workspace --color always
      - name: Careful
        if: success() || failure()
        run: cargo +${{ env.RUST_NIGHTLY }} careful nextest run --all-features ${{ needs.delta.outputs.affected }} --color always --target ${{ matrix.target }}
      - name: Miri
        if: success() || failure()
        run: cargo +${{ env.RUST_NIGHTLY }} miri test --all-features ${{ needs.delta.outputs.affected }} --lib --tests

  mutation-testing:
    if: github.event_name == 'pull_request'
    needs: [testing]
    runs-on: ubuntu-latest
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          enable-wild-linker: true
          rust-toolchain: RUST_NIGHTLY
          cargo-tools: CARGO_MUTANTS_VERSION

      # execute
      - name: Generate PR Diff
        run: git diff origin/main...HEAD >diff.txt
      - name: Mutate Diff
        timeout-minutes: 45
        run: cargo +${{ env.RUST_NIGHTLY }} -Zscript scripts/mutants.rs --in-place --in-diff diff.txt

  coverage:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Note: windows-11-arm excluded due to LLVM coverage instrumentation bugs
        # causing "malformed instrumentation profile data: symbol name is empty" errors
        os: [ubuntu-latest, windows-latest, ubuntu-24.04-arm]
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_NIGHTLY
          rust-components: llvm-tools-preview
          cargo-tools: CARGO_LLVM_COV_VERSION

      # execute
      - name: Generate Coverage (all-features)
        run: cargo +${{ env.RUST_NIGHTLY }} llvm-cov --all-features --workspace --lcov --output-path lcov-all.info
      - name: Generate Coverage (no-default-features)
        run: cargo +${{ env.RUST_NIGHTLY }} llvm-cov --no-default-features --workspace --lcov --output-path lcov-no-def.info
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov-all.info,lcov-no-def.info
          fail_ci_if_error: true

  pr-title:
    runs-on: ubuntu-slim
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR Title
        uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            build
            chore
            ci
            doc
            docs
            feat
            fix
            misc
            miscellaneous
            perf
            refactor
            style
            task
            test

  license-headers:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1
      - name: Check License Headers
        uses: viperproject/check-license-header@v2.0.3
        with:
          path: .
          config: .github/license-check/config.json
          strict: true

  external-type-exposure:
    runs-on: ubuntu-slim
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_NIGHTLY_EXTERNAL_TYPES
          cargo-tools: CARGO_CHECK_EXTERNAL_TYPES_VERSION

      # execute
      - name: Check External Type Exposure
        run: cargo +${{ env.RUST_NIGHTLY_EXTERNAL_TYPES }} -Zscript scripts/check-external-types.rs ${{ env.RUST_NIGHTLY_EXTERNAL_TYPES }}
