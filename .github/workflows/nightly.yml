name: nightly

permissions:
  contents: read
  pull-requests: read

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  nightly-gatekeeper:
    runs-on: ubuntu-slim
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Check for changes in last 24 hours
        id: check
        run: |
          # Check logs for commits in the last 24 hours on the current branch
          if [[ -z $(git log --since="24 hours ago" --pretty=format:"%H") ]]; then
            echo "No commits in the last 24 hours. Skipping..."
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New commits found. Proceeding..."
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  # mutation-testing: disabled for debugging
  # miri-strict-provenance: disabled for debugging
  # miri-race-coverage: disabled for debugging

  miri-tree-borrows:
    needs: [nightly-gatekeeper]
    if: ${{ needs.nightly-gatekeeper.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_NIGHTLY
          rust-components: miri

      # execute
      - name: Miri (tree borrows)
        env:
          MIRIFLAGS: -Zmiri-tree-borrows
          # Crates whose tests are run one-by-one in separate Miri processes
          # to avoid accumulating tree-borrows metadata beyond runner memory.
          MIRI_ISOLATED_CRATES: multitude
        run: |
          set -euo pipefail

          TOOLCHAIN="+${{ env.RUST_NIGHTLY }}"
          COMMON_ARGS="--all-features --lib --tests"

          # Build excludes for workspace run
          EXCLUDES=""
          for crate in $MIRI_ISOLATED_CRATES; do
            EXCLUDES="$EXCLUDES --exclude $crate"
          done

          # 1) Workspace run (everything except isolated crates)
          if [[ -n "$EXCLUDES" ]]; then
            echo "::group::Workspace (excluding: $MIRI_ISOLATED_CRATES)"
            cargo $TOOLCHAIN miri test $COMMON_ARGS --workspace $EXCLUDES
            echo "::endgroup::"
          fi

          # 2) Isolated crates: run each lib test as its own Miri process.
          #    Integration tests (--tests) are already separate binaries, so
          #    they run normally alongside the lib tests at the end.
          for crate in $MIRI_ISOLATED_CRATES; do
            echo "::group::Listing lib tests for $crate"
            TESTS=$(cargo $TOOLCHAIN test -p "$crate" --all-features --lib -- --list 2>/dev/null \
              | grep ': test$' | sed 's/: test$//')
            TEST_COUNT=$(echo "$TESTS" | wc -l)
            echo "Found $TEST_COUNT lib tests in $crate"
            echo "::endgroup::"

            CURRENT=0
            FAILED=0
            for test in $TESTS; do
              CURRENT=$((CURRENT + 1))
              echo "::group::[$CURRENT/$TEST_COUNT] $crate :: $test"
              if ! cargo $TOOLCHAIN miri test -p "$crate" --all-features --lib -- --exact "$test" 2>&1; then
                echo "::error::FAILED: $crate :: $test"
                FAILED=$((FAILED + 1))
              fi
              echo "::endgroup::"
            done

            # Run integration tests normally (each is already a separate binary)
            echo "::group::$crate integration tests"
            if ! cargo $TOOLCHAIN miri test -p "$crate" --all-features --tests 2>&1; then
              echo "::error::FAILED: $crate integration tests"
              FAILED=$((FAILED + 1))
            fi
            echo "::endgroup::"

            if [[ $FAILED -gt 0 ]]; then
              echo "::error::$FAILED test(s) failed in $crate"
              exit 1
            fi
          done
        timeout-minutes: 240

