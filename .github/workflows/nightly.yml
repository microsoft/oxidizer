name: nightly

permissions:
  contents: read
  pull-requests: read

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  nightly-gatekeeper:
    runs-on: ubuntu-slim
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Check for changes in last 24 hours
        id: check
        run: |
          # Check logs for commits in the last 24 hours on the current branch
          if [[ -z $(git log --since="24 hours ago" --pretty=format:"%H") ]]; then
            echo "No commits in the last 24 hours. Skipping..."
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New commits found. Proceeding..."
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  # mutation-testing: disabled for debugging
  # miri-strict-provenance: disabled for debugging
  # miri-race-coverage: disabled for debugging

  miri-tree-borrows:
    needs: [nightly-gatekeeper]
    if: ${{ needs.nightly-gatekeeper.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest-8-cores
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_NIGHTLY
          rust-components: miri

      # diagnostics
      - name: Resource limits
        run: |
          echo "=== cgroup memory limits ==="
          cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo "no cgroup memory limit found"
          cat /sys/fs/cgroup/memory.swap.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.memsw.limit_in_bytes 2>/dev/null || echo "no cgroup swap limit found"
          echo "=== ulimits ==="
          ulimit -a
          echo "=== system memory ==="
          free -m
          echo "=== swap config ==="
          swapon --show
          cat /proc/sys/vm/swappiness || true
          echo "=== cgroup full ==="
          cat /proc/self/cgroup
          ls -la /sys/fs/cgroup/ 2>/dev/null || true

      # execute
      - name: Miri (tree borrows)
        env:
          MIRIFLAGS: -Zmiri-tree-borrows
        run: |
          # Monitor memory in background
          (while true; do echo "=== $(date -Iseconds) ==="; free -m; cat /sys/fs/cgroup/memory.current 2>/dev/null || true; echo; sleep 30; done) &
          MONITOR_PID=$!
          EXIT=0
          cargo +${{ env.RUST_NIGHTLY }} miri test --all-features --workspace --lib --tests 2>&1 || EXIT=$?
          kill $MONITOR_PID 2>/dev/null || true
          echo "--- exit code: $EXIT ---"
          echo "--- dmesg OOM check ---"
          sudo dmesg | grep -i -E 'oom|killed|out of memory' || echo "No OOM messages found"
          echo "--- cgroup OOM events ---"
          cat /sys/fs/cgroup/memory.events 2>/dev/null || true
          exit $EXIT
        timeout-minutes: 240

