name: nightly

permissions:
  contents: read
  pull-requests: read

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      miri-tree-borrows-skip:
        description: >
          Space-separated list of test names to --skip in the
          miri-tree-borrows job (substring match).
        required: false
        default: >-
          alloc_slice_local_with_or_panic_at_max_normal_uses_fast_path

jobs:
  nightly-gatekeeper:
    runs-on: ubuntu-slim
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Check for changes in last 24 hours
        id: check
        run: |
          # Check logs for commits in the last 24 hours on the current branch
          if [[ -z $(git log --since="24 hours ago" --pretty=format:"%H") ]]; then
            echo "No commits in the last 24 hours. Skipping..."
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New commits found. Proceeding..."
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  # mutation-testing: disabled for debugging
  # miri-strict-provenance: disabled for debugging
  # miri-race-coverage: disabled for debugging

  miri-tree-borrows:
    needs: [nightly-gatekeeper]
    if: ${{ needs.nightly-gatekeeper.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      # prep
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Setup
        uses: ./.github/actions/setup
        with:
          enable-sccache: true
          rust-toolchain: RUST_NIGHTLY
          rust-components: miri

      # execute
      - name: Miri (tree borrows)
        env:
          MIRIFLAGS: -Zmiri-tree-borrows
          # Tests skipped by default (also configurable via workflow_dispatch input):
          #
          # alloc_slice_local_with_or_panic_at_max_normal_uses_fast_path
          #   Although the allocation itself is only 4 KiB (512 u64s),
          #   the arena's bump-fit / drop-entry / protective-hold path
          #   involves many pointer reborrows into the 64 KiB pre-
          #   allocated chunk. Under tree-borrows the per-byte provenance
          #   tracking for these reborrows exceeds 16 GB.
          MIRI_SKIP: ${{ inputs.miri-tree-borrows-skip || 'alloc_slice_local_with_or_panic_at_max_normal_uses_fast_path' }}
        run: |
          SKIP_ARGS=""
          for test in $MIRI_SKIP; do
            SKIP_ARGS="$SKIP_ARGS --skip $test"
          done
          echo "Skipping tests: $MIRI_SKIP"
          cargo +${{ env.RUST_NIGHTLY }} miri test --all-features --workspace --lib --tests \
            -- $SKIP_ARGS
        timeout-minutes: 240

