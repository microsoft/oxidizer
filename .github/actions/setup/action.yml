name: Setup Environment
description: Configures tool versions, sets up caches, installs Rust and Cargo tools.

inputs:
  enable-sccache:
    description: Enable sccache for build caching
    required: false
    default: 'false'
  rust-toolchain:
    description: Rust toolchain to install. Can be a version (e.g., "stable", "1.70"), multiple (e.g., "stable,nightly"), or environment variable names from constants.env (e.g., "RUST_MSRV" or "RUST_LATEST,RUST_NIGHTLY"). Leave empty to skip Rust installation.
    required: false
    default: ''
  rust-components:
    description: Comma-separated list of Rust components to install (e.g., "clippy, rustfmt")
    required: false
    default: ''
  cargo-tools:
    description: Comma-separated list of cargo tools to install. Can be environment variable names (e.g., "CARGO_HACK_VERSION") which will be expanded to "cargo-hack@<value>", or explicit tool@version pairs (e.g., "cargo-hack@0.6.39")
    required: false
    default: ''
  enable-wild-linker:
    description: Install Wild linker for faster linking
    required: false
    default: 'false'
  free-disk-space:
    description: >-
      Remove unused pre-installed toolchains to reclaim disk space and guard
      against intermittent "No space left on device" failures on the heavier
      build/test jobs. Linux reclaims ~18 GB (Android SDK, Haskell/GHC, Swift,
      Chromium); Windows reclaims ~17 GB (Android SDK, Haskell/GHC). No-op on
      macOS.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    # GitHub only guarantees 14 GB of storage on standard runners; the heavy
    # `cargo hack --each-feature` + `--all-features` test build peaks well above
    # that, so we reclaim space up front. These directories are unused by our
    # Rust builds. See https://github.com/microsoft/oxidizer (work item 7611559).
    - name: Free Disk Space (Linux)
      if: inputs.free-disk-space == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        echo "Disk before cleanup:"
        df -h /
        # Fast `rm -rf` reclaims (no slow apt purge): Android ~10 GB, Haskell
        # ~4 GB, Swift ~3 GB, Chromium ~1 GB.
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc /usr/local/.ghcup
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/share/chromium /usr/local/share/edge_driver
        echo "Disk after cleanup:"
        df -h /

    # Windows runners start with far less free space (~34 GB vs ~89 GB on Linux)
    # because the pre-installed tooling (Visual Studio, .NET, Android) is much
    # larger. Reclaim the big dirs unused by our Rust builds. Visual Studio,
    # .NET, and the hosted tool cache (holds sccache) are intentionally kept.
    - name: Free Disk Space (Windows)
      if: inputs.free-disk-space == 'true' && runner.os == 'Windows'
      shell: pwsh
      run: |
        function Free-GB { [math]::Round((Get-CimInstance Win32_LogicalDisk -Filter "DeviceID='C:'").FreeSpace / 1GB, 1) }
        "Free before cleanup (GB): $(Free-GB)"
        # Android SDK ~13 GB, Haskell/ghcup ~4 GB.
        foreach ($p in 'C:\Program Files (x86)\Android', 'C:\Android', 'C:\ghcup') {
          if (Test-Path $p) { Remove-Item -LiteralPath $p -Recurse -Force -ErrorAction SilentlyContinue }
        }
        "Free after cleanup (GB): $(Free-GB)"

    - name: Loading Repo Constants
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> "$GITHUB_ENV"

        constants_path="${{ github.workspace }}/constants.env"
        while IFS= read -r line; do
          if [[ "$line" =~ ^([A-Z0-9_]+)=([^[:space:]]+) ]]; then
            echo "${BASH_REMATCH[1]}=${BASH_REMATCH[2]}" >> "$GITHUB_ENV"
          fi
        done < "$constants_path"

    - name: Processing Tool Versions
      if: inputs.rust-toolchain != '' || inputs.cargo-tools != ''
      id: expand
      shell: bash
      run: |
        # Expand Rust Toolchain
        if [[ -n '${{ inputs.rust-toolchain }}' ]]; then
          expanded=""
          IFS=',' read -ra parts <<< '${{ inputs.rust-toolchain }}'
          for part in "${parts[@]}"; do
            part=${part// /}
            if [[ "$part" =~ ^[A-Z0-9_]+$ ]] && [[ -n "${!part}" ]]; then
              part="${!part}"
            fi
            expanded+="${expanded:+,}$part"
          done
          echo "toolchain=$expanded" >> "$GITHUB_OUTPUT"
        fi

        # Expand Cargo Tools
        if [[ -n '${{ inputs.cargo-tools }}' ]]; then
          expanded=""
          IFS=',' read -ra parts <<< '${{ inputs.cargo-tools }}'
          for tool in "${parts[@]}"; do
            tool=${tool// /}
            if [[ "$tool" =~ ^CARGO_([A-Z0-9_]+)_VERSION$ ]]; then
              name=$(echo "${BASH_REMATCH[1]}" | tr 'A-Z_' 'a-z-')
              val="${!tool}"
              [[ -n "$val" ]] && tool="cargo-$name@$val"
            elif [[ "$tool" =~ ^([A-Z0-9_]+)_VERSION$ ]]; then
              name=$(echo "${BASH_REMATCH[1]}" | tr 'A-Z_' 'a-z-')
              val="${!tool}"
              [[ -n "$val" ]] && tool="$name@$val"
            elif [[ "$tool" =~ ^(.+)@([A-Z0-9_]+)$ ]]; then
              val="${!BASH_REMATCH[2]}"
              [[ -n "$val" ]] && tool="${BASH_REMATCH[1]}@$val"
            fi
            expanded+="${expanded:+, }$tool"
          done
          echo "cargo_tools=$expanded" >> "$GITHUB_OUTPUT"
        fi

    # Note: sccache is skipped on Windows ARM64 due to missing binaries
    # See: https://github.com/Mozilla-Actions/sccache-action/issues/189
    - name: Configure Sccache
      if: inputs.enable-sccache == 'true' && !(runner.os == 'Windows' && runner.arch == 'ARM64')
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

    - name: Start Sccache
      if: inputs.enable-sccache == 'true' && !(runner.os == 'Windows' && runner.arch == 'ARM64')
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      with:
        version: ${{ env.SCCACHE_VERSION }}

    - name: Install Rust
      if: inputs.rust-toolchain != ''
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        toolchain: ${{ steps.expand.outputs.toolchain }}
        components: ${{ inputs.rust-components }}

    - name: Install Cargo Tools
      if: inputs.cargo-tools != ''
      # taiki-e/install-action publishes immutable GitHub releases (verified via the GitHub API:
      # "immutable": true on GET /repos/taiki-e/install-action/releases/tags/v2.81.8). The tag
      # cannot be retargeted, so this reference is intentionally left unpinned to a commit SHA.
      # See https://github.com/taiki-e/install-action/releases/tag/v2.81.8
      uses: taiki-e/install-action@v2.81.8
      with:
        tool: ${{ steps.expand.outputs.cargo_tools }}

    - name: Install Wild Linker
      if: inputs.enable-wild-linker == 'true'
      uses: wild-linker/action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
