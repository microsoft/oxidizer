version: 2
updates:
- package-ecosystem: "cargo"
  directory: "/"
  schedule:
    interval: "weekly"
    day: "monday"
    time: "07:00"
    timezone: "UTC"
  commit-message:
    prefix: "chore: "
  ignore:
    # ignore minor updates for tokio as they are semver compatible
    - dependency-name: "tokio"
      versions: ["1.x"]
    # ignore patch updates for all dependencies
    - dependency-name: "*"
      update-types: ["version-update:semver-patch"]

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "monthly"
  # 7-day cooldown before Dependabot proposes a newly published Action version. This gives
  # the community/security researchers a window to detect and report a compromised or
  # "poisoned" release before it's automatically pulled into this repo.
  cooldown:
    default-days: 7
