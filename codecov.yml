coverage:
  precision: 1
  round: down
  range: 100..100
  status:
    project:
      default:
        target: 100
        threshold: "0"
        base: auto
ignore:
- "crates/testing_aids/**/*"
# Macro expansion causes coverage to be inaccurate in these files, so we ignore them for now. We can re-enable them once we have a better solution for macro coverage.
- "crates/ohno/src/test_util.rs"
