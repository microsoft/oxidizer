[package]
name = "routerama_build"
version = "0.1.0"
description = "Build-time code generator for routerama."
readme = "README.md"
keywords = ["http", "router", "routing", "codegen", "build"]
categories = ["development-tools::build-utils", "web-programming"]

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
include.workspace = true
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/routerama_build"

[package.metadata.cargo_check_external_types]
allowed_external_types = ["http_path_template::path_template::PathTemplate", "proc_macro2::TokenStream"]

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
all-features = true

[features]
default = ["codegen"]
# Build-time code generation (the `Generator` API). Pulls in `proc-macro2`
# / `quote`; without it only the framework-neutral routing trie (`trie` module,
# used by the runtime dynamic router) is compiled.
codegen = ["dep:proc-macro-crate", "dep:proc-macro2", "dep:quote", "dep:syn"]

[dependencies]
http_path_template = { workspace = true }
proc-macro-crate = { workspace = true, optional = true }
proc-macro2 = { workspace = true, optional = true }
quote = { workspace = true, optional = true }
syn = { workspace = true, optional = true, features = ["clone-impls", "parsing", "proc-macro", "printing", "derive", "full", "visit"] }
unicode-ident = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
mutants = { workspace = true }
prettyplease = { workspace = true }
syn = { workspace = true, features = ["full", "parsing"] }

[lints]
workspace = true

[[bench]]
name = "generator_scaling"
harness = false
required-features = ["codegen"]
