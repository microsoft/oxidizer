[package]
name = "sync_thunk_macros_impl"
description = "Macros for the sync_thunk crate."
version = "0.1.0"
readme = "README.md"
keywords = ["oxidizer", "blocking", "async"]
categories = ["asynchronous", "concurrency"]

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/sync_thunk_macros_impl"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "proc_macro2::TokenStream",
    "syn::error::Error",
    "syn::error::Result",
]

[package.metadata.docs.rs]
all-features = true

[dependencies]
proc-macro2.workspace = true
quote.workspace = true
syn = { workspace = true, features = ["clone-impls", "derive", "full", "parsing", "printing", "proc-macro"] }

[dev-dependencies]
insta.workspace = true
mutants.workspace = true
prettyplease.workspace = true
quote.workspace = true

[dev-dependencies.syn]
workspace = true
features = [
    "clone-impls",
    "derive",
    "full",
    "extra-traits",
    "parsing",
    "printing",
    "proc-macro",
]

[lints]
workspace = true
