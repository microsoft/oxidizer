[package]
name = "sync_thunk_macros"
description = "Macros for the sync_thunk crate."
version = "0.1.0"
readme = "README.md"
keywords = ["oxidizer", "blocking", "async"]
categories = ["asynchronous", "concurrency"]

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/sync_thunk_macros"

[package.metadata.cargo_check_external_types]
allowed_external_types = ["sync_thunk_macros::*"]

[package.metadata.docs.rs]
all-features = true

[lib]
proc-macro = true

[dependencies]
sync_thunk_macros_impl.workspace = true

[dev-dependencies]
mutants.workspace = true

[lints]
workspace = true
