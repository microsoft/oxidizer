[package]
name = "http_path_template"
description = "Parser for the google.api.http path-template grammar"
version = "0.2.0"
readme = "README.md"
keywords = ["grpc", "rest", "path", "template", "http"]
categories = ["parser-implementations", "web-programming"]

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
include.workspace = true
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/http_path_template"

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
all-features = true

[features]
default = ["std"]
# Captures a `std::backtrace::Backtrace` into `ParseError` for richer
# diagnostics. Disable for `#![no_std]` use; the crate then requires only
# `alloc` and captures no backtrace. `ParseError` implements
# `core::error::Error` either way.
std = []

[dependencies]

[dev-dependencies]
criterion = { workspace = true }
mutants = { workspace = true }

# Callgrind instruction-count benchmarks (Valgrind is Linux-only).
[target.'cfg(target_os = "linux")'.dev-dependencies]
gungraun = { workspace = true, features = ["default"] }

[[bench]]
name = "hpt_parse"
harness = false

[[bench]]
name = "hpt_parse_cg"
harness = false

# >>> anvil-managed: anvil-lints
[lints]
workspace = true
# <<< anvil-managed: anvil-lints
