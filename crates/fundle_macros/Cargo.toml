[package]
name = "fundle_macros"
description = "Macros for the fundle crate."
version = "0.3.4"
readme = "README.md"
keywords = ["oxidizer", "di", "proc-macro"]
categories = ["rust-patterns"]

edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/fundle_macros"

[package.metadata.docs.rs]
all-features = true

# Thin proc-macro entry crate: the only coverage source for `#[proc_macro_attribute]`
# entry points is compile-time expansion in consumers, which is non-deterministic under
# impact-scoped `cargo llvm-cov nextest`. The shims carry `#[coverage(off)]` and the
# delegated logic lives in `fundle_macros_impl` (gated normally), so this crate reports
# no instrumented lines; opt it out of the per-package line gate.
[package.metadata.coverage-gate]
min-lines-percent = 0

[lib]
proc-macro = true

[dependencies]
fundle_macros_impl = { workspace = true }

[dev-dependencies]
mutants = { workspace = true }

# >>> anvil-managed: anvil-lints
[lints]
workspace = true
# <<< anvil-managed: anvil-lints
