[package]
name = "templated_uri"
description = "Standards-compliant URI handling with templating, validation, and data classification"
version = "0.1.2"
readme = "README.md"
keywords = ["oxidizer", "url", "parsing", "templates", "uri"]
categories = ["encoding", "parser-implementations", "template-engine", "web-programming"]

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/templated_uri"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "data_privacy::data_class::DataClass",
    "data_privacy::redacted::RedactedDebug",
    "data_privacy::redacted::RedactedDisplay",
    "data_privacy::redaction_engine::RedactionEngine",
    "data_privacy::sensitive::Sensitive",
    "http::error::Error",
    "http::uri::authority::Authority",
    "http::uri::InvalidUri",
    "http::uri::InvalidUriParts",
    "http::uri::Parts",
    "http::uri::path::PathAndQuery",
    "http::uri::scheme::Scheme",
    "http::uri::Uri",
    "templated_uri_macros::templated",
    "templated_uri_macros::Escape",
    "templated_uri_macros::Raw",
    "ohno::enrichable::Enrichable",
    "ohno::error_ext::ErrorExt",
    "ohno::error_label::ErrorLabel",
    "ohno::error_label::Labeled",
    "serde_core::de::*",
    "serde_core::ser::*",
    "uuid::Uuid",
]

[package.metadata.docs.rs]
all-features = true

[features]
default = ["uuid"]
serde = ["dep:serde"]
uuid = ["dep:uuid"]

[dependencies]
data_privacy.workspace = true
http.workspace = true
ohno.workspace = true
pct-str = { workspace = true, features = ["std"] }
serde = { workspace = true, features = ["std", "derive"], optional = true }
templated_uri_macros.workspace = true
uuid = { workspace = true, optional = true }

[dev-dependencies]
mutants.workspace = true
serde = { workspace = true, features = ["std", "derive"] }
serde_json = { workspace = true, features = ["std"] }
static_assertions.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
trybuild.workspace = true
uuid = { workspace = true, features = ["v4"] }

[lints]
workspace = true

[[example]]
name = "classified_templating"
path = "examples/classified_templating.rs"

[[example]]
name = "uri_templating"
path = "examples/uri_templating.rs"
