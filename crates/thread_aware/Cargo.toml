[package]
name = "thread_aware"
description = "Facilities to support thread-isolated state."
version = "0.7.3"
readme = "README.md"
keywords = ["oxidizer", "thread", "aware"]
categories = ["data-structures"]

edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/thread_aware"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "thread_aware_macros::ThreadAware",
    # `bytes_v1` feature
    "bytes::bytes::Bytes",
    "bytes::bytes_mut::BytesMut",
    # `http_v1` feature
    "http::header::map::HeaderMap",
    "http::header::name::HeaderName",
    "http::header::value::HeaderValue",
    "http::method::Method",
    "http::request::Request",
    "http::response::Response",
    "http::status::StatusCode",
    "http::version::Version",
    # `jiff_v0_2` feature
    "jiff::civil::date::Date",
    "jiff::civil::datetime::DateTime",
    "jiff::civil::iso_week_date::ISOWeekDate",
    "jiff::civil::time::Time",
    "jiff::signed_duration::SignedDuration",
    "jiff::span::Span",
    "jiff::timestamp::Timestamp",
    # `uuid_v1` feature
    "uuid::Uuid",
]

[package.metadata.docs.rs]
all-features = true

[features]
default = ["derive"]
derive = ["dep:thread_aware_macros"]
threads = ["dep:many_cpus"]

# Optional `ThreadAware` impls for 3rd-party crate types. Each feature is
# suffixed with the major (or 0.x minor) of the wrapped crate so that new
# breaking versions of those crates can be supported additively (e.g. a
# future `bytes_v2`) without forcing a breaking release of this crate.
# See the `third_party` module for the list of types each feature covers.
bytes_v1 = ["dep:bytes_v1"]
http_v1 = ["dep:http_v1"]
jiff_v0_2 = ["dep:jiff_v0_2"]
uuid_v1 = ["dep:uuid_v1"]

[dependencies]
many_cpus = { workspace = true, optional = true }

thread_aware_macros = { workspace = true, optional = true }

bytes_v1 = { workspace = true, optional = true }
http_v1 = { workspace = true, optional = true }
jiff_v0_2 = { workspace = true, optional = true }
uuid_v1 = { workspace = true, optional = true }

[dev-dependencies]
bytes_v1 = { workspace = true }
futures = { workspace = true, features = ["executor"] }
http_v1 = { workspace = true }
jiff_v0_2 = { workspace = true }
many_cpus = { workspace = true, features = ["test-util"] }
mutants = { workspace = true }
static_assertions = { workspace = true }
thread_aware_macros = { path = "../thread_aware_macros" }
uuid_v1 = { workspace = true }

[lints]
workspace = true
