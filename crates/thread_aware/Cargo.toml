[package]
name = "thread_aware"
description = "Facilities to support thread-isolated state."
version = "0.7.3"
readme = "README.md"
keywords = ["oxidizer", "thread", "aware"]
categories = ["data-structures"]

edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/thread_aware"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "thread_aware_macros::ThreadAware",
    # `bytes` feature
    "bytes::bytes::Bytes",
    "bytes::bytes_mut::BytesMut",
    # `chrono` feature
    "chrono::datetime::DateTime",
    "chrono::month::Month",
    "chrono::naive::date::NaiveDate",
    "chrono::naive::datetime::NaiveDateTime",
    "chrono::naive::time::NaiveTime",
    "chrono::offset::fixed::FixedOffset",
    "chrono::offset::utc::Utc",
    "chrono::time_delta::TimeDelta",
    "chrono::weekday::Weekday",
    # `http` feature
    "http::method::Method",
    "http::status::StatusCode",
    "http::version::Version",
    # `jiff` feature
    "jiff::civil::date::Date",
    "jiff::civil::datetime::DateTime",
    "jiff::civil::iso_week_date::ISOWeekDate",
    "jiff::civil::time::Time",
    "jiff::signed_duration::SignedDuration",
    "jiff::span::Span",
    "jiff::timestamp::Timestamp",
    # `time` feature
    "time::date::Date",
    "time::duration::Duration",
    "time::month::Month",
    "time::offset_date_time::OffsetDateTime",
    "time::primitive_date_time::PrimitiveDateTime",
    "time::time::Time",
    "time::utc_offset::UtcOffset",
    "time::weekday::Weekday",
    # `uuid` feature
    "uuid::Uuid",
]

[package.metadata.docs.rs]
all-features = true

[features]
default = ["derive"]
derive = ["dep:thread_aware_macros"]
threads = ["dep:many_cpus"]

# Optional `ThreadAware` impls for 3rd-party crate types. Each feature pulls in
# only that one crate as an optional dependency. See `third_party::*` modules.
bytes = ["dep:bytes"]
chrono = ["dep:chrono"]
http = ["dep:http"]
jiff = ["dep:jiff"]
time = ["dep:time"]
uuid = ["dep:uuid"]

[dependencies]
many_cpus = { workspace = true, optional = true }

thread_aware_macros = { workspace = true, optional = true }

bytes = { workspace = true, optional = true }
chrono = { workspace = true, optional = true }
http = { workspace = true, optional = true }
jiff = { workspace = true, optional = true }
time = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }

[dev-dependencies]
futures = { workspace = true, features = ["executor"] }
many_cpus = { workspace = true, features = ["test-util"] }
mutants = { workspace = true }
static_assertions = { workspace = true }
thread_aware_macros = { path = "../thread_aware_macros" }

[lints]
workspace = true
