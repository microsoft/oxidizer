[package]
name = "thread_aware"
description = "Facilities to support thread-isolated state."
version = "0.7.3"
readme = "README.md"
keywords = ["oxidizer", "thread", "aware"]
categories = ["data-structures"]

edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/thread_aware"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "thread_aware_macros::ThreadAware",
    # `bytes_v1` feature
    "bytes::bytes::Bytes",
    "bytes::bytes_mut::BytesMut",
    # `http_v1` feature
    "http::header::map::HeaderMap",
    "http::header::name::HeaderName",
    "http::header::value::HeaderValue",
    "http::method::Method",
    "http::request::Request",
    "http::response::Response",
    "http::status::StatusCode",
    "http::version::Version",
    # `jiff_v0_2` feature
    "jiff::civil::date::Date",
    "jiff::civil::datetime::DateTime",
    "jiff::civil::iso_week_date::ISOWeekDate",
    "jiff::civil::time::Time",
    "jiff::signed_duration::SignedDuration",
    "jiff::span::Span",
    "jiff::timestamp::Timestamp",
    # `uuid_v1` feature
    "uuid::Uuid",
]

[package.metadata.docs.rs]
all-features = true

[features]
default = ["derive"]
derive = ["dep:thread_aware_macros"]
threads = ["dep:many_cpus"]

# Optional `ThreadAware` impls for 3rd-party crate types. Each feature is
# suffixed with the major (or 0.x minor) of the wrapped crate so that new
# breaking versions of those crates can be supported additively (e.g. a
# future `bytes_v2`) without forcing a breaking release of this crate.
# See the `third_party` module for the list of types each feature covers.
bytes_v1 = ["dep:bytes_v1"]
http_v1 = ["dep:http_v1"]
jiff_v0_2 = ["dep:jiff_v0_2"]
uuid_v1 = ["dep:uuid_v1"]

[dependencies]
many_cpus = { workspace = true, optional = true }

thread_aware_macros = { workspace = true, optional = true }

bytes_v1 = { version = "1.11.1", default-features = false, package = "bytes", optional = true }
http_v1 = { version = "1.4.1", default-features = false, features = ["std"], package = "http", optional = true }
jiff_v0_2 = { version = "0.2.21", default-features = false, package = "jiff", optional = true }
uuid_v1 = { version = "1.21.0", default-features = false, package = "uuid", optional = true }

[dev-dependencies]
bytes_v1 = { version = "1.11.1", default-features = false, package = "bytes" }
criterion = { workspace = true }
futures = { workspace = true, features = ["executor"] }
http_v1 = { version = "1.4.1", default-features = false, features = ["std"], package = "http" }
jiff_v0_2 = { version = "0.2.21", default-features = false, package = "jiff" }
many_cpus = { workspace = true, features = ["test-util"] }
mutants = { workspace = true }
static_assertions = { workspace = true }
thread_aware_macros = { path = "../thread_aware_macros" }
uuid_v1 = { version = "1.21.0", default-features = false, package = "uuid" }

# Workspace dep declares `default-features = false`; we re-enable `default` here
# (which pulls in the `benchmark` feature with `library_benchmark`,
# `library_benchmark_group!`, and `gungraun::main!`) only on Linux, since
# gungraun requires Valgrind.
[target.'cfg(target_os = "linux")'.dev-dependencies]
gungraun = { workspace = true, features = ["default"] }

[lints]
workspace = true

[[bench]]
name = "criterion_third_party"
harness = false
required-features = ["bytes_v1", "http_v1", "jiff_v0_2", "uuid_v1"]

# Callgrind benches require Linux (Valgrind). The bench file is gated to compile
# to a no-op on non-Linux targets, but the [[bench]] entry itself cannot be
# cfg-gated, so it is unconditional here.
[[bench]]
name = "gungraun_third_party"
harness = false
required-features = ["bytes_v1", "http_v1", "jiff_v0_2", "uuid_v1"]
