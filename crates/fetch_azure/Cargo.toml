[package]
name = "fetch_azure"
description = "Azure SDK transport and runtime backed by the fetch HTTP client and an anyspawn spawner."
version = "0.1.0"
readme = "README.md"
keywords = ["oxidizer", "azure", "fetch", "http", "runtime"]
categories = ["network-programming"]

edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/fetch_azure"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    # Workspace sibling crates
    "anyspawn::*",
    "fetch::*",
    "tick::*",
    # External dependencies (azure_core re-exports these typespec types)
    "azure_identity::*",
    "typespec_client_core::*",
]

[package.metadata.docs.rs]
all-features = true

[features]
## Implement [`azure_identity::Executor`] for [`Runtime`], allowing it to run the
## subprocesses that developer credentials (e.g. the Azure CLI) rely on.
azure-identity = ["dep:azure_identity"]

[dependencies]
# internal
anyspawn = { workspace = true }
bytesbuf = { workspace = true, features = ["bytes-compat"] }
fetch = { workspace = true }
layered = { workspace = true }
tick = { workspace = true }

# external
async-trait = { workspace = true }
azure_core = { workspace = true }
azure_identity = { workspace = true, optional = true }
futures = { workspace = true, features = ["std"] }
http = { workspace = true }

[dev-dependencies]
# internal
anyspawn = { path = "../anyspawn", features = ["tokio"] }
fetch = { path = "../fetch", features = ["test-util", "tokio", "rustls"] }
tick = { path = "../tick", features = ["tokio"] }

# external
async-trait = { workspace = true }
azure_core = { workspace = true }
azure_storage_blob = { workspace = true }
futures = { workspace = true, features = ["std"] }
mutants = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }

[[example]]
name = "blob_list"
required-features = ["azure-identity"]

[lints]
workspace = true
