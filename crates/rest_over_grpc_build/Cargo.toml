[package]
name = "rest_over_grpc_build"
version = "0.1.0"
description = "Build-time codegen that turns google.api.http-annotated gRPC services into REST routers"
readme = "README.md"
keywords = ["grpc", "rest", "codegen", "build", "router"]
categories = ["development-tools::build-utils", "web-programming", "encoding"]

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
include.workspace = true
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/rest_over_grpc_build"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "http_path_template::PathTemplate",
    "proc_macro2::TokenStream",
]

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]
all-features = true

[features]
default = []
# Enables reading `google.api.http` annotations from a compiled
# `FileDescriptorSet` via reflection (`descriptor` module).
descriptor = ["dep:prost-reflect"]

[dependencies]
http_path_template = { workspace = true }
proc-macro2 = { workspace = true }
prost-reflect = { workspace = true, optional = true }
quote = { workspace = true }

[dev-dependencies]
prettyplease = { workspace = true }
prost-reflect = { workspace = true }
prost-types = { workspace = true }
protox = { workspace = true }
syn = { workspace = true, features = ["full", "parsing"] }

[lints]
workspace = true
