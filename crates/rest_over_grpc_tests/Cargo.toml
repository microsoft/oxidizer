[package]
name = "rest_over_grpc_tests"
description = "End-to-end/correctness tests and benchmarks for the rest_over_grpc::build generated router, service traits, and transcoder"
version = "0.0.0"
publish = false

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true

# Private generated-code fixture: its public surface intentionally mirrors
# prost, tonic, and rest_over_grpc APIs.
[package.metadata.cargo_check_external_types]
allowed_external_types = ["*"]

# These dependencies are consumed by build.rs, generated Rust included from
# OUT_DIR, or rustdoc links, which cargo-machete's source scan cannot attribute.
[package.metadata.cargo-machete]
ignored = [
    "http-body",
    "http_path_template",
    "pbjson",
    "pbjson-build",
    "prost",
    "prost-build",
    "protox",
    "routerama",
    "serde",
    "tonic-prost",
    "tonic-prost-build",
]

# This fixture crate is excluded from repository coverage; production coverage
# is enforced on rest_over_grpc itself.
[package.metadata.coverage-gate]
min-lines-percent = 0

[dependencies]
futures-util = { workspace = true, features = ["std"] }
http = { workspace = true, features = ["std"] }
pbjson = { workspace = true }
prost = { workspace = true, features = ["std", "derive"] }
rest_over_grpc = { workspace = true, features = ["tower"] }
serde = { workspace = true, features = ["std", "derive"] }
serde_json = { workspace = true, features = ["std"] }
tonic = { workspace = true, features = ["codegen"] }
tonic-prost = { workspace = true }

[build-dependencies]
http_path_template = { workspace = true }
pbjson-build = { workspace = true }
prost-build = { workspace = true }
protox = { workspace = true }
rest_over_grpc = { workspace = true, features = ["build-openapi"] }
routerama = { workspace = true }
tonic-prost-build = { workspace = true }

[dev-dependencies]
bytes = { workspace = true }
futures = { workspace = true, features = ["std", "executor"] }
http-body = { workspace = true }
http-body-util = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
tower-service = { workspace = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
gungraun = { workspace = true, features = ["default"] }
matchit = { workspace = true }

[lints]
workspace = true

[[bench]]
name = "rog_router_cg"
harness = false

[[bench]]
name = "rog_transcode_cg"
harness = false
