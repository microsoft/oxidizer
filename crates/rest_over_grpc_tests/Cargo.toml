[package]
name = "rest_over_grpc_tests"
description = "End-to-end/correctness tests and benchmarks for the rest_over_grpc::build generated router, service traits, and transcoder"
version = "0.0.0"
publish = false

edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true

[dependencies]
futures-util = { workspace = true, features = ["std"] }
http = { workspace = true, features = ["std"] }
prost = { workspace = true, features = ["std", "derive"] }
rest_over_grpc = { workspace = true, features = ["tower"] }
serde = { workspace = true, features = ["std", "derive"] }
serde_json = { workspace = true, features = ["std"] }
tonic = { workspace = true, features = ["codegen"] }
tonic-prost = { workspace = true }

[build-dependencies]
pbjson-build = { workspace = true }
prost-build = { workspace = true }
protox = { workspace = true }
rest_over_grpc = { workspace = true, features = ["build-openapi"] }
tonic-prost-build = { workspace = true }

[dev-dependencies]
bytes = { workspace = true }
futures = { workspace = true, features = ["std", "executor"] }
http-body = { workspace = true }
http-body-util = { workspace = true }
tokio = { workspace = true, features = ["rt", "macros"] }
tower-service = { workspace = true }

[target.'cfg(target_os = "linux")'.dev-dependencies]
gungraun = { workspace = true, features = ["default"] }
matchit = { workspace = true }

[lints]
workspace = true

[[bench]]
name = "rog_router_cg"
harness = false

[[bench]]
name = "rog_transcode_cg"
harness = false
