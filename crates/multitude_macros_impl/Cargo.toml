[package]
name = "multitude_macros_impl"
description = "Macros for the multitude crate."
version = "0.1.0"
readme = "README.md"
keywords = ["oxidizer", "arena", "allocator", "macro", "derive"]
categories = ["data-structures"]

edition = { workspace = true }
rust-version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
include = { workspace = true }
repository = "https://github.com/microsoft/oxidizer/tree/main/crates/multitude_macros_impl"

[package.metadata.cargo_check_external_types]
allowed_external_types = [
    "proc_macro2::*",
    "syn::attr::*",
    "syn::error::*",
    "syn::path::*",
    "syn::ty::*",
]

[package.metadata.docs.rs]
all-features = true

[dependencies]
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { workspace = true, features = ["full", "derive", "printing", "parsing", "extra-traits", "proc-macro", "clone-impls"] }

[dev-dependencies]
prettyplease = { workspace = true }

# >>> anvil-managed: anvil-lints
[lints]
workspace = true
# <<< anvil-managed: anvil-lints
