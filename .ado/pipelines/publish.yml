trigger:
- main

parameters:
- name: validationOsList
  type: object
  default:
  - linux
  - windows
- name: validationProfiles
  type: object
  default:
  - dev
  - release
- name: previousVersion
  type: string
  default: 'HEAD^'
# Whether to perform the publish. On the Official pipeline this defaults to
# true so qualifying builds publish for real.
- name: executePublish
  displayName: 'Publish crates (real publish)'
  type: boolean
  default: true

resources:
  repositories:
  # Internal repository that hosts the publishing template
  - repository: ox-sdk
    type: git
    name: ox-sdk
    ref: refs/heads/master

extends:
  template: .pipelines/templates/OxidizerGitHub.Publish.yml@ox-sdk
  parameters:
    validationOsList: ${{ parameters.validationOsList }}
    validationProfiles: ${{ parameters.validationProfiles }}
    previousVersion: ${{ parameters.previousVersion }}
    executePublish: ${{ parameters.executePublish }}
